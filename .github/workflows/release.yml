name: Build & Release Extension

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "AGENTS.md"
      - ".gitignore"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Auto-bump patch version
        id: version
        run: |
          CURRENT=$(node -p "require('./manifest.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            m.version = '$NEW_VERSION';
            fs.writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
          "
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped version: $CURRENT → $NEW_VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Create ZIP
        run: |
          cd build
          zip -r ../weblang-translator-v${{ steps.version.outputs.version }}.zip .

      - name: Commit & push version bump
        id: push
        run: |
          git add manifest.json
          git commit -m "chore: bump version to v${{ steps.version.outputs.version }} [skip ci]"
          git push
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: weblang-translator-v${{ steps.version.outputs.version }}.zip
          target_commitish: ${{ steps.push.outputs.sha }}
          generate_release_notes: true
          make_latest: true
