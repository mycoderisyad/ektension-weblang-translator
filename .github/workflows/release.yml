name: Build & Release Extension

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Create ZIP
        run: cd build && zip -r ../weblang-translator-${{ github.ref_name }}.zip . && cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: weblang-translator-${{ github.ref_name }}.zip
          generate_release_notes: true
